<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Descobrindo Brusque - Início</title>
  <link rel="stylesheet" href="./styles/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="bg">
    <img src="Assets/88d0398a-1b34-4019-8a98-a15f71a4063c.jpg" alt="Fenarreco">
  </div>

  <div class="card">
    <div class="mascot-area">
      <img class="mascot-bg" src="Assets/fef2797b-49ed-481b-9ef7-0992428fc505.jpg" alt="Mascote Marreco">
    </div>

    <h1 class="title">DESCOBRINDO BRUSQUE!</h1>
    <p class="subtitle">Vamos aprender sobre a história e a cultura de nossa cidade? 🎉</p>

<form id="playerInfoForm">
    <div class="field">
      <label for="nome">NOME:</label>
      <input id="nome" type="text" placeholder="Digite seu nome…" />
    </div>
    <div class="field">
      <label for="idade">IDADE:</label>
      <input id="idade" type="number" min="1" max="18" placeholder="Sua idade…" />
    </div>
    <div class="field">
      <label for="escola">ESCOLA:</label>
      <input id="escola" type="text" placeholder="Nome da escola…" />
    </div>
     <button type="button" class="btn-play" id="btnJogar">
       <span class="emoji">🦫</span> Vamos Jogar! <span class="emoji">🦫</span>
     </button>
 

    <a href="" class="btn-play" id="btnEntrar">
      <span></span>Entrar<span class="emoji">🦫</span>
    </a>
  </div>

</body>

</html>
