<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Descobrindo Brusque - Início</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fundo principal */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, rgba(135,206,235,0.85) 0%, rgba(200,230,180,0.6) 60%, rgba(139,195,74,0.4) 100%);
      background-color: #87CEEB;
    }

    /* Imagem de fundo com opacidade  */
    .bg img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;      /* cobre toda a tela sem distorcer */
      object-position: center; /* centraliza a imagem */
      opacity: 0.25;          /* opacidade baixa*/
      pointer-events: none;   /* para não atrapalhar cliques */
    }
   

    /* Card principal */
    .card {
      position: relative; z-index: 10;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 32px;
      padding: 2rem 2.5rem 2.5rem;
      width: min(520px, 94vw);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1) inset;
      animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Área do mascote */
    .mascot-area {
      position: relative;
      width: 140px;
      height: 140px;
      margin: -80px auto 1rem;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      box-shadow: 0 0 0 5px #fff, 0 8px 24px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    
    .mascot-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }




    /* Títulos */
    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: #1b5e20;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      font-size: 0.95rem;
      font-weight: 700;
      color: #33691e;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    /* Campos de formulário */
    .field {
      display: flex;
      align-items: center;
      background: #6abf5e;
      border-radius: 50px;
      padding: 0 1.2rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12), 0 -2px 0 rgba(255,255,255,0.2) inset;
      transition: transform 0.15s, box-shadow 0.15s;
    }
  
    .field label {
      font-weight: 800;
      color: #fff;
      font-size: 0.9rem;
      white-space: nowrap;
      min-width: 70px;
      text-align: left;
    }
    
    .field input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      padding: 0.85rem 0.5rem;
    }
    .field input::placeholder { color: rgba(255,255,255,0.6); }

    /* Botão jogar */
    .btn-play {
      margin-top: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7CB342, #558B2F);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 50px;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #33691e, 0 10px 20px rgba(0,0,0,0.2);
      transition: transform 0.1s, box-shadow 0.1s;
      text-decoration: none;
    }
    .btn-play:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #33691e, 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-play:hover { filter: brightness(1.1); }
    .btn-play .emoji { font-size: 1.5rem; }

  </style>
</head>
<body>
  <div class="bg">
    <img src="Assets/88d0398a-1b34-4019-8a98-a15f71a4063c.jpg" alt="">

  </div>

  <div class="card">
    <div class="mascot-area">
      <img class="mascot-bg" 
           src="Assets/fef2797b-49ed-481b-9ef7-0992428fc505.jpg">
    </div>

    <h1 class="title">DESCOBRINDO BRUSQUE!</h1>
    <p class="subtitle">Vamos aprender sobre a história e a cultura de<br>nossa cidade? 🎉</p>

    <div class="field">
      <label for="nome">NOME:</label>
      <input id="nome" type="text" placeholder="Digite seu nome…" />
    </div>
    <div class="field">
      <label for="idade">IDADE:</label>
      <input id="idade" type="number" min="1" max="18" placeholder="Sua idade…" />
    </div>
    <div class="field">
      <label for="escola">ESCOLA:</label>
      <input id="escola" type="text" placeholder="Nome da escola…" />
    </div>
    

    <a href="" class="btn-play" id="btnJogar">
      <span class="emoji">🦫</span> Vamos Jogar! <span class="emoji">🦫</span>
    </a>

      <a href="" class="btn-play" id="btnJogar">
      <span ></span>Entrar<span class="emoji">🦫</span>
    </a>

  </div>

</body>
</html>
