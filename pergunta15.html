<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pergunta 15 - Descobrindo Brusque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/pergunta.css">
</head>
<body>
  <div class="pergunta-screen">

    <span class="counter">15 de 15</span>

    <div class="progress-track"></div>
    <div class="progress-fill" style="width: 1345px;"></div>
    <img class="capivara-progress" style="left: 1296px;" src="" alt="" />

    <div class="pergunta-badge">Pergunta 15</div>

    <div class="question-image">
      <img src="" alt="Imagem da pergunta 15" />
    </div>

    <button class="sound-btn-main">
      <img src="" alt="som" />
    </button>
    <p class="question-text">Por que é importante aprender sobre a cidade de Brusque?</p>

    <div class="options-area">

      <div class="option">
        <button class="option-sound"><img src="" alt="som" /></button>
        <div class="option-box">
          <div class="letter-circle">A</div>
          <span class="option-text">Para conhecer a história e cultura</span>
        </div>
      </div>

      <div class="option">
        <button class="option-sound"><img src="" alt="som" /></button>
        <div class="option-box">
          <div class="letter-circle">B</div>
          <span class="option-text">Para não estudar</span>
        </div>
      </div>

      <div class="option">
        <button class="option-sound"><img src="" alt="som" /></button>
        <div class="option-box">
          <div class="letter-circle">C</div>
          <span class="option-text">Para dormir</span>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      var el = document.querySelector('.pergunta-screen');
      function fit() {
        var sx = (window.innerWidth  - 48) / 1440;
        var sy = (window.innerHeight - 48) / 1024;
        el.style.transform = 'scale(' + Math.min(sx, sy) + ')';
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
