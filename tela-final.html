<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parabéns!</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Baloo 2', cursive;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Imagem de fundo ── */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/unnamed.jpg');
      background-size: cover;
      background-position: center;
      filter: none;
    }

    /* overlay semitransparente verde*/
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(120, 180, 80, 0.35);
    }

    /* ── Bloco de texto central ── */
    .message {
      position: relative;
      z-index: 10;
      text-align: center;
      line-height: 1.25;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .message p {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      color: #2d6a00;           
      text-shadow:
        2px 2px 0 rgba(255,255,255,0.45),
        -1px -1px 0 rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg">
    </div>

    <div class="message">
      <p>Parabéns, você<br>terminou o<br>jogo!!<br>Você foi muito<br>bem!!</p>
    </div>
  </div>
</body>
</html>
